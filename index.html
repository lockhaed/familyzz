<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family'ZZ — Burgers Sucy-en-Brie</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0;
      }
      .menu {
        width: 100%;
        max-width: 1400px;
        display: flex;
        flex-direction: row;
        align-items: flex-start;
      }
      img { width: 50%; display: block; }

      @media (max-width: 768px) {
        .menu { flex-direction: column; }
        img { width: 100%; }
        img:last-child { margin-top: -15%; }
      }
    </style>
  </head>
  <body>
    <div class="menu">
      <img src="assets/page1.png" alt="Menu Family'ZZ — page 1" />
      <img src="assets/page2.png" alt="Menu Family'ZZ — page 2" />
    </div>
  </body>
</html>
